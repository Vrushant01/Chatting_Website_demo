<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  width: 90%;
  max-width: 400px;
  background: rgba(30,41,59,0.9);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  text-align: center;
}

h2 {
  color: white;
  margin-bottom: 30px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

</style>
</head>
<body>

<div class="login-box">
  <h2>🔥 Welcome to Live Chat</h2>
  <input id="username" placeholder="Enter your username">
  <button onclick="enterChat()">Enter Chat</button>
</div>

<script>
function enterChat() {
  const name = document.getElementById("username").value.trim();
  if (!name) {
    alert("Please enter username");
    return;
  }

  localStorage.setItem("username", name);
  window.location.href = "/frontend/chat.html";
}

document.getElementById("username")
.addEventListener("keypress", e => {
  if (e.key === "Enter") enterChat();
});
</script>

</body>
</html>
